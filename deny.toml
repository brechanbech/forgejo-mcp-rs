[advisories]
# RUSTSEC vulnerabilities are always denied by cargo-deny. On top of that: refuse yanked
# releases, and flag unmaintained crates in our own dependency closure.
unmaintained = "workspace"
yanked = "deny"

[licenses]
# Keep the dependency tree permissive. If something copyleft sneaks in, fail loud.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "OpenSSL"]
confidence-threshold = 0.9
# The allow-list is a forward-looking policy, so don't warn when an allowed license
# happens not to appear in the current tree.
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
